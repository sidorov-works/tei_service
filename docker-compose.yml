services:
  encoder_service:
    build:
      context: .
      dockerfile: dockerfile.windows
    ports:
      - "8260:8260"
    volumes:
      - ./models:/app/models
    env_file:
      - .env
    restart: unless-stopped
    command: >
      uvicorn encoder_service.main:app
      --port 8260 --host 0.0.0.0 --workers 1
      --loop uvloop --lifespan on --timeout-graceful-shutdown 15
    init: true
    shm_size: '2gb'
    mem_limit: 8g
    cpus: '4.0'
    # ✅ Ключевое: резервируем GPU для Windows[citation:1]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]