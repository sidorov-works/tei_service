services:
  encoder_service:
    build: .
    ports:
      - "8260:8260"
    env_file:
      - .env
    restart: unless-stopped
    command: >
      uvicorn encoder_service.main:app
      --port 8260
      --host 0.0.0.0
      --workers 1 
      --loop uvloop
      --lifespan on
      --timeout-graceful-shutdown 15
    init: true
    # Оптимальные настройки для ML
    shm_size: '2gb'      # Shared memory (критически для PyTorch dataloader)
    mem_limit: 4g        # Максимум ОЗУ для контейнера
    cpus: '2.0'          # Максимум 2 CPU ядра